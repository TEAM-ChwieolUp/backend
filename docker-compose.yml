services:
  mysql:
    image: mysql:8.0.36
    container_name: cheerup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cheerup
      MYSQL_USER: cheerup_local
      MYSQL_PASSWORD: cheerup_local_pw
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    ports:
      - "3316:3306"
    volumes:
      - cheerup_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  cheerup_mysql_data:
